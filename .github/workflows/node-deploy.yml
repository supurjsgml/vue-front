name: master

on:
    workflow_dispatch:
#    push:
#      branches:
#        - master

jobs:
    # 소스 변동 사항 체크
    check:
        runs-on: ubuntu-latest
        outputs:
            changed: ${{ steps.changed-files.outputs.changed }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                fetch-depth: 2
            - name: Check for changes
              id: changed-files
              run: |
                # node 프로젝트에 맞춰 감시할 경로 파일 조져
                if git diff --quiet HEAD^ HEAD -- \
                  api/ assets/ components/ config/ pages/ public/ server/ stores/ \
                  app.vue nuxt.config.ts package.json tsconfig.json; then
                  echo "changed=false" >> $GITHUB_OUTPUT
                else
                  echo "changed=true" >> $GITHUB_OUTPUT
                fi
              
    # 빌드
    build:
        needs: check
        if: needs.check.outputs.changed == 'true'
        runs-on: ubuntu-latest
        
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
        
            # Node.js 설정
            - name: Set up Node.js 22
              uses: actions/setup-node@v4
              with:
                node-version: '22'
                cache: 'yarn' # yarn 캐시 설정
        
            # 패키지 설치
            - name: Install dependencies
              run: yarn install --frozen-lockfile
        
            # Nuxt 빌드
            - name: Build Nuxt project
              run: yarn build
            
            # 넉3 업로드
            - name: Upload Build Artifact
              uses: actions/upload-artifact@v4
              with:
                name: node-app-build
                path: |
                      .output
                      package.json
                      Procfile
                      yarn.lock
                      .env.prod
                retention-days: 7 # 아티팩트 깃헙에 7일 동안 보관
    
    # 배포
    deploy:
        needs: [check, build]
        if: needs.check.outputs.changed == 'true'
        runs-on: ubuntu-latest

        environment: vue-front

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              
            # 빌드한 파일 다운로드
            - name: Download Build Artifact
              uses: actions/download-artifact@v4
              with:
                name: node-app-build
                path: .

            # 헤로쿠 CLI 설치 (기존 스크립트 백업용 주석 처리)
            # - name: Install Heroku CLI
            #   run: curl https://cli-assets.heroku.com/install.sh | sh

            # Heroku 배포 (기존 스크립트 백업용 주석 처리)
            # - name: Deploy to Heroku
            #   uses: akhileshns/heroku-deploy@v3.13.15
            #   with:
            #     heroku_api_key: ${{ secrets.HEROKU_API_KEY_NODE }}
            #     heroku_app_name: ${{ secrets.HEROKU_APP_NAME_NODE }}
            #     heroku_email: ${{ secrets.HEROKU_EMAIL }}
            #     usedocker: false
            #     rollbackonhealthcheckfailed: false

            # Lightsail로 빌드 파일 전송 (SCP)
            - name: Copy build files to Lightsail
              uses: appleboy/scp-action@v0.1.7
              with:
                host: ${{ secrets.LIGHTSAIL_HOST }}
                username: ${{ secrets.LIGHTSAIL_USERNAME }}
                key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
                source: ".output,package.json,yarn.lock,.env.prod"
                target: "/home/ubuntu/vue-front"

            # Lightsail 서버에서 PM2 실행 및 구동
            - name: SSH to Lightsail and deploy
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.LIGHTSAIL_HOST }}
                username: ${{ secrets.LIGHTSAIL_USERNAME }}
                key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
                script: |
                  cd /home/ubuntu/vue-front
                  # PM2를 이용하여 포트 9000번으로 Nuxt 실행 및 무중단 재시작
                  PORT=9000 pm2 start .output/server/index.mjs --name "vue-front" || PORT=9000 pm2 reload "vue-front" --update-env
                  pm2 save
            
    # 변경사항 없으면 서버만 재시작    
    restart:
        needs: check
        if: needs.check.outputs.changed == 'false'
        runs-on: ubuntu-latest
        steps:
            # 헤로쿠 재시작 (기존 스크립트 백업용 주석 처리)
            # - name: Install Heroku CLI
            #   run: curl https://cli-assets.heroku.com/install.sh | sh
            # - name: Restart Heroku Dynos
            #   run: heroku ps:restart -a ${{ secrets.HEROKU_APP_NAME_NODE }}
            #   env:
            #       HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY_NODE }}

            - name: SSH to Lightsail and restart PM2
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.LIGHTSAIL_HOST }}
                username: ${{ secrets.LIGHTSAIL_USERNAME }}
                key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
                script: |
                  pm2 restart "vue-front"